<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Матрица Конкурсов v4.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --bg: #f5f3ef;
    --paper: #ffffff;
    --card: #fafaf8;
    --accent: #b8860b;
    --text: #0f0d0a;
    --muted: #3d3628;
    --border: #d5d0c4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
    padding: 24px 24px 60px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(196,154,26,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(192,57,43,0.04) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 900;
    color: var(--accent);
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* TABS */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .tab {
    padding: 10px 22px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
    background: var(--paper);
  }

  .tab:hover { color: var(--text); border-color: var(--muted); }

  .tab.active {
    color: #ffffff;
    font-weight: 700;
    border-color: transparent;
  }

  .tab[data-event="wedding"].active    { background: #c0392b; }
  .tab[data-event="corporate"].active  { background: #2980b9; }
  .tab[data-event="birthday"].active   { background: #e8b84b; }
  .tab[data-event="content"].active    { background: #8e44ad; }

  /* MATRIX TABLE */
  .matrix-wrap {
    max-width: 100%;
    margin: 0 auto 24px;
    padding: 0 16px;
    overflow-x: auto;
  }

  .matrix-table {
    display: flex;
    gap: 10px;
    width: 100%;
    min-width: 700px;
  }

  .axis {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 12px 14px;
    position: relative;
    flex: 1 1 0;
    min-width: 120px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .axis::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--col);
    border-radius: 4px 4px 0 0;
  }

  .axis-header {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .axis-icon { font-size: 14px; line-height: 1; }

  .axis-label {
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--col);
    white-space: nowrap;
  }

  .axis-desc {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.4;
  }

  .chips {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .chip {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    background: var(--paper);
    color: var(--muted);
    user-select: none;
    white-space: normal;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .chip:hover { border-color: var(--muted); color: var(--text); }

  .chip.selected {
    background: var(--col);
    color: #ffffff;
    border-color: transparent;
    font-weight: 700;
  }

  .chip .chip-icons {
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.1s;
    flex-shrink: 0;
  }

  .chip:hover .chip-icons { opacity: 1; }

  .chip-icon {
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    padding: 1px 2px;
    border-radius: 2px;
    transition: background 0.1s;
  }

  .chip-icon:hover { background: rgba(255,255,255,0.15); }

  /* IDEAS */
  .ideas-wrap {
    max-width: 100%;
    margin: 36px auto 0;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  .ideas-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .ideas-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .ideas-add-btn {
    background: transparent;
    border: 1px dashed var(--accent);
    color: var(--accent);
    padding: 8px 20px;
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .ideas-add-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .ideas-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .idea-card {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }

  .idea-num {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    color: var(--muted);
    padding-top: 10px;
    flex-shrink: 0;
    min-width: 20px;
    text-align: right;
  }

  .idea-textarea {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    resize: none;
    outline: none;
    min-height: 48px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .idea-textarea::placeholder { color: var(--muted); }
  .idea-textarea:focus { border-color: var(--accent); }

  .idea-del {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 8px 4px;
    flex-shrink: 0;
    transition: color 0.1s;
    line-height: 1;
  }

  .idea-del:hover { color: #e74c3c; }
  .chip.has-tooltip {
    position: relative;
  }

  .chip-tooltip {
    display: none;
    position: absolute;
    left: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%);
    background: #ffffff;
    border: 1px solid var(--border);
    border-left: 2px solid var(--col);
    border-radius: 3px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text);
    line-height: 1.6;
    width: 220px;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  .chip.has-tooltip:hover .chip-tooltip {
    display: block;
  }

  /* arrow */
  .chip-tooltip::before {
    content: '';
    position: absolute;
    right: 100%;
    top: 50%;
    transform: translateY(-50%);
    border: 5px solid transparent;
    border-right-color: var(--border);
  }
  .chip-edit-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--col);
    outline: none;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    color: inherit;
    width: 100%;
    padding: 0;
    min-width: 60px;
  }

  .chip.editing {
    cursor: default;
    border-style: dashed;
  }

  /* ADD INPUT */
  .add-row {
    display: flex;
    gap: 5px;
    margin-top: 4px;
  }

  .add-input {
    flex: 1;
    background: var(--paper);
    border: 1px dashed var(--border);
    border-radius: 2px;
    padding: 5px 8px;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    color: var(--text);
    outline: none;
    min-width: 0;
    transition: border-color 0.15s;
  }

  .add-input::placeholder { color: var(--muted); }
  .add-input:focus { border-color: var(--col); }

  .add-btn {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 2px;
    color: var(--muted);
    font-size: 16px;
    padding: 0 8px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }

  .add-btn:hover { border-color: var(--col); color: var(--col); }

  /* CONTROLS */
  .controls {
    max-width: 100%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 20px;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  /* SELECTION BAR */
  .selection-bar {
    max-width: 100%;
    margin: 0 auto 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    min-height: 28px;
    align-items: center;
  }

  .sel-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .sel-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 2px;
    font-family: 'Courier Prime', monospace;
    border: 1px solid transparent;
  }

  .sel-empty { font-size: 11px; color: var(--muted); }

  /* GENERATE */
  .generate-wrap {
    text-align: center;
    margin-bottom: 28px;
  }

  .generate-btn {
    background: var(--accent);
    color: #ffffff;
    border: none;
    padding: 14px 52px;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .generate-btn:hover {
    background: #b8890f;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(196,154,26,0.3);
  }

  /* RESULT */
  .result-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    display: none;
    position: relative;
    max-width: 100%;
    margin: 0 auto;
  }

  .result-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #8e44ad);
    border-radius: 4px 4px 0 0;
  }

  .result-box.visible { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .result-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }

  .result-tag {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 2px;
    background: var(--border);
    color: var(--muted);
  }

  .result-desc {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .result-steps-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .result-steps { list-style: none; counter-reset: steps; }

  .result-steps li {
    counter-increment: steps;
    padding: 9px 0 9px 34px;
    position: relative;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    border-bottom: 1px solid rgba(200,190,170,0.4);
  }

  .result-steps li:last-child { border-bottom: none; }

  .result-steps li::before {
    content: counter(steps, decimal-leading-zero);
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
  }

  .result-tip {
    margin-top: 18px;
    padding: 12px 16px;
    background: rgba(196,154,26,0.08);
    border-left: 2px solid var(--accent);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .result-tip strong { color: var(--accent); }

  /* SAVE BUTTON */
  .save-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 32px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .save-btn:hover { background: var(--accent); color: var(--bg); }
  .save-btn:disabled { opacity: 0.5; cursor: default; }

  /* VAULT */
  .vault-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .vault-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
  }
  .vault-count {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    background: var(--border);
    padding: 3px 10px;
    border-radius: 2px;
  }
  .vault-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .vault-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }
  .vault-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .vault-event { font-size: 14px; margin-right: 6px; }
  .vault-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.3;
  }
  .vault-del {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    flex-shrink: 0;
    transition: color 0.1s;
  }
  .vault-del:hover { color: var(--accent2); }
  .vault-params {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .vault-desc {
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
  }
  .vault-details {
    margin-top: 4px;
  }
  .vault-details summary {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .vault-details summary:hover { color: var(--text); }
  .vault-steps {
    list-style: none;
    counter-reset: vsteps;
    margin-top: 8px;
  }
  .vault-steps li {
    counter-increment: vsteps;
    padding: 6px 0 6px 28px;
    position: relative;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    border-bottom: 1px solid rgba(200,190,170,0.3);
  }
  .vault-steps li:last-child { border-bottom: none; }
  .vault-steps li::before {
    content: counter(vsteps, decimal-leading-zero);
    position: absolute; left: 0;
    color: var(--accent); font-size: 10px; font-weight: 700;
  }
  .vault-tip {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    padding: 8px 12px;
    background: rgba(196,154,26,0.06);
    border-left: 2px solid var(--accent);
    line-height: 1.5;
  }
  .vault-tip strong { color: var(--accent); }

  .loading {
    text-align: center;
    padding: 36px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .dot-anim::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'}
  }

  /* ── MOBILE ─────────────────────────────────────────────── */
  @media (max-width: 700px) {
    body { padding: 14px 10px 80px; }

    h1 { font-size: 26px; }
    .subtitle { font-size: 9px; letter-spacing: 2px; margin-bottom: 16px; }

    /* Tabs: scroll horizontally */
    .tabs {
      flex-wrap: nowrap;
      overflow-x: auto;
      justify-content: flex-start;
      padding-bottom: 6px;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 10px 16px; font-size: 11px; }

    /* Matrix: vertical stack instead of horizontal scroll */
    .matrix-wrap { padding: 0; }
    .matrix-table {
      flex-direction: column;
      min-width: unset;
      gap: 8px;
    }

    .axis {
      flex-direction: row;
      flex-wrap: wrap;
      padding: 12px 10px 10px;
      gap: 6px;
    }

    .axis-header { width: 100%; }
    .axis-desc { display: none; }

    /* Chips: horizontal scroll row per axis */
    .chips {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 5px;
      width: 100%;
    }

    .chip {
      font-size: 13px;
      padding: 9px 13px;
      border-radius: 20px;
      flex-direction: row;
    }

    /* Hide edit/delete icons on mobile by default — long press shows context */
    .chip .chip-icons { display: none; }
    .chip.edit-mode .chip-icons { display: flex; opacity: 1; }

    /* Add row */
    .add-row { width: 100%; margin-top: 2px; }
    .add-input { font-size: 13px; padding: 8px 10px; }
    .add-btn { padding: 0 12px; font-size: 18px; }

    /* Controls */
    .controls { gap: 7px; }
    .btn-secondary { font-size: 10px; padding: 9px 14px; letter-spacing: 1px; }

    /* Selection bar */
    .sel-tag { font-size: 12px; padding: 5px 12px; }

    /* Generate button */
    .generate-btn { padding: 16px 36px; font-size: 16px; width: 100%; }

    /* Result */
    .result-box { padding: 18px 14px; }
    .result-name { font-size: 20px; }

    /* Ideas */
    .ideas-wrap { padding-top: 18px; }
    .ideas-title { font-size: 15px; }

    /* Vault */
    .vault-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="api-key-banner" style="display:none; background:#fff8e7; border:1px solid #e8b84b; border-left:4px solid #e8b84b; border-radius:4px; padding:14px 18px; max-width:700px; margin:0 auto 20px; font-family:'Courier Prime',monospace; font-size:12px; color:#3d3628;">
  <div style="font-weight:700; margin-bottom:8px; font-size:13px;">🔑 Нужен API ключ Anthropic</div>
  <div style="margin-bottom:10px; line-height:1.6;">Чтобы AI генерировал конкурсы, введи свой ключ. Он хранится только у тебя в браузере.<br>Получить ключ: <a href="https://console.anthropic.com/keys" target="_blank" style="color:#b8860b;">console.anthropic.com/keys</a></div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <input id="api-key-input" type="password" placeholder="sk-ant-..." style="flex:1; min-width:200px; padding:8px 12px; border:1px solid #d5d0c4; border-radius:3px; font-family:'Courier Prime',monospace; font-size:12px; outline:none;">
    <button onclick="saveApiKey()" style="background:#b8860b; color:#fff; border:none; padding:8px 20px; border-radius:3px; font-family:'Courier Prime',monospace; font-size:12px; cursor:pointer; white-space:nowrap;">Сохранить</button>
  </div>
</div>

<h1>Матрица Конкурсов</h1>
<p class="subtitle">4 формата · 7 осей · ✏️ переименовать · 💾 автосохранение v4.0</p>

<div class="tabs" id="tabs">
  <button class="tab active" data-event="wedding">💍 Свадьба</button>
  <button class="tab" data-event="corporate">🏢 Корпоратив</button>
  <button class="tab" data-event="birthday">🎂 День рождения</button>
  <button class="tab" data-event="content">🎬 Контент</button>
</div>

<div class="matrix-wrap">
  <div class="matrix-table" id="matrix"></div>
</div>

<div class="selection-bar" id="selectionBar"></div>

<div class="controls">
  <button class="btn-secondary" onclick="randomize()">⚄ Случайная комбинация</button>
  <button class="btn-secondary" onclick="resetSelected()">↺ Сбросить выбор</button>
  <button class="btn-secondary" onclick="exportData()" title="Скачать настройки как JSON">⬇ Экспорт</button>
  <label class="btn-secondary" style="cursor:pointer;" title="Загрузить настройки из JSON">⬆ Импорт<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
</div>

<div class="generate-wrap">

let currentEvent = 'wedding';
let customData = {};  // customData[event][key] = []
let selected = {};    // selected[event][key] = null | string

// Init state
['wedding','corporate','birthday','content'].forEach(ev => {
  customData[ev] = {};
  selected[ev] = {};
  AXIS_META.forEach(a => {
    customData[ev][a.key] = [];
    selected[ev][a.key] = null;
  });
});

function allChips(ev, key) {
  return [...DEFAULT_DATA[ev][key], ...customData[ev][key]];
}

function renderMatrix() {
  const ev = currentEvent;
  const container = document.getElementById('matrix');
  container.innerHTML = '';

  AXIS_META.forEach((axis, i) => {
    const col = AXIS_COLORS[i];
    const div = document.createElement('div');
    div.className = 'axis';
    div.style.setProperty('--col', col);

    // header
    const header = document.createElement('div');
    header.className = 'axis-header';
    header.innerHTML = `<span class="axis-icon">${axis.icon}</span><span class="axis-label">${axis.label}</span>`;
    div.appendChild(header);

    // desc
    const desc = document.createElement('div');
    desc.className = 'axis-desc';
    desc.textContent = axis.desc;
    div.appendChild(desc);

    // chips container
    const chipsDiv = document.createElement('div');
    chipsDiv.className = 'chips';

    allChips(ev, axis.key).forEach((opt, oi) => {
      const isCustom = oi >= DEFAULT_DATA[ev][axis.key].length;

      const chip = document.createElement('div');
      chip.className = 'chip' + (selected[ev][axis.key] === opt ? ' selected' : '');
      chip.style.setProperty('--col', col);

      const label = document.createElement('span');
      label.className = 'chip-label';
      label.textContent = opt;
      chip.appendChild(label);

      // tooltip for transformation axis
      if (axis.key === 'transformation' && TRANSFORMATION_HINTS[opt]) {
        const tooltip = document.createElement('div');
        tooltip.className = 'chip-tooltip';
        tooltip.textContent = TRANSFORMATION_HINTS[opt];
        chip.appendChild(tooltip);
        chip.classList.add('has-tooltip');
      }

      // icons group (pencil + delete)
      const icons = document.createElement('span');
      icons.className = 'chip-icons';

      // pencil — always
      const pencil = document.createElement('span');
      pencil.className = 'chip-icon chip-edit-btn';
      pencil.textContent = '✏️';
      pencil.style.display = 'inline-block';
      pencil.style.transform = 'scaleX(-1)';
      pencil.title = 'Переименовать';
      pencil.addEventListener('click', (e) => {
        e.stopPropagation();
        // switch chip to edit mode
        chip.classList.add('editing');
        icons.style.display = 'none';
        label.style.display = 'none';

        const inp = document.createElement('input');
        inp.className = 'chip-edit-input';
        inp.value = opt;
        chip.insertBefore(inp, chip.firstChild);
        inp.focus();
        inp.select();

        let committed = false;
        const commit = () => {
          if (committed) return;
          committed = true;
          const newVal = inp.value.trim();
          if (newVal && newVal !== opt) {
            const defArr = DEFAULT_DATA[ev][axis.key];
            const custArr = customData[ev][axis.key];
            const defIdx = defArr.indexOf(opt);
            const custIdx = custArr.indexOf(opt);
            if (defIdx > -1) defArr[defIdx] = newVal;
            else if (custIdx > -1) custArr[custIdx] = newVal;
            if (selected[ev][axis.key] === opt) selected[ev][axis.key] = newVal;
          }
          renderMatrix(); renderSelectionBar();
        };

        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
          if (e.key === 'Escape') { committed = true; renderMatrix(); }
        });
        inp.addEventListener('blur', commit);
        inp.addEventListener('click', e => e.stopPropagation());
      });
      icons.appendChild(pencil);

      // delete — all chips
      const del = document.createElement('span');
      del.className = 'chip-icon chip-del';
      del.textContent = '✕';
      del.title = 'Удалить';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        const defArr = DEFAULT_DATA[ev][axis.key];
        const custArr = customData[ev][axis.key];
        const defIdx = defArr.indexOf(opt);
        const custIdx = custArr.indexOf(opt);
        if (defIdx > -1) defArr.splice(defIdx, 1);
        else if (custIdx > -1) custArr.splice(custIdx, 1);
        if (selected[ev][axis.key] === opt) selected[ev][axis.key] = null;
        renderMatrix(); renderSelectionBar();
      });
      icons.appendChild(del);

      chip.appendChild(icons);

      chip.addEventListener('click', () => {
        selected[ev][axis.key] = selected[ev][axis.key] === opt ? null : opt;
        renderMatrix(); renderSelectionBar();
      });

      // Long press on mobile → toggle edit-mode (show icons)
      let pressTimer = null;
      chip.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => {
          // toggle edit mode on this chip
          const isEdit = chip.classList.contains('edit-mode');
          // close all others first
          document.querySelectorAll('.chip.edit-mode').forEach(c => c.classList.remove('edit-mode'));
          if (!isEdit) {
            chip.classList.add('edit-mode');
            showToast('✏️ Нажми иконку для правки или ✕ для удаления');
          }
          e.preventDefault();
        }, 450);
      }, { passive: true });
      chip.addEventListener('touchend', () => { clearTimeout(pressTimer); });
      chip.addEventListener('touchmove', () => { clearTimeout(pressTimer); });

      chipsDiv.appendChild(chip);
    });

    div.appendChild(chipsDiv);

    // add row
    const addRow = document.createElement('div');
    addRow.className = 'add-row';

    const input = document.createElement('input');
    input.className = 'add-input';
    input.placeholder = '+ свой вариант';
    input.style.setProperty('--col', col);

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+';
    addBtn.style.setProperty('--col', col);

    const doAdd = () => {
      const val = input.value.trim();
      if (!val) return;
      if (allChips(ev, axis.key).includes(val)) { input.value = ''; return; }
      customData[ev][axis.key].push(val);
      input.value = '';
      renderMatrix(); renderSelectionBar();
    };

    addBtn.onclick = doAdd;
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

    addRow.appendChild(input);
    addRow.appendChild(addBtn);
    div.appendChild(addRow);

    container.appendChild(div);
  });
}

function renderSelectionBar() {
  const ev = currentEvent;
  const bar = document.getElementById('selectionBar');
  bar.innerHTML = '<span class="sel-label">Выбрано: </span>';

  const chosen = AXIS_META.filter(a => selected[ev][a.key]);
  if (!chosen.length) {
    bar.innerHTML += '<span class="sel-empty">ничего</span>';
    return;
  }

  chosen.forEach((axis, i) => {
    const col = AXIS_COLORS[AXIS_META.indexOf(axis)];
    const tag = document.createElement('span');
    tag.className = 'sel-tag';
    tag.style.background = col + '22';
    tag.style.color = col;
    tag.style.borderColor = col + '55';
    tag.textContent = `${axis.icon} ${selected[ev][axis.key]}`;
    bar.appendChild(tag);
  });
}

function randomize() {
  const ev = currentEvent;
  AXIS_META.forEach(a => {
    const chips = allChips(ev, a.key);
    selected[ev][a.key] = chips[Math.floor(Math.random() * chips.length)];
  });
  renderMatrix(); renderSelectionBar();
}

function resetSelected() {
  const ev = currentEvent;
  AXIS_META.forEach(a => selected[ev][a.key] = null);
  renderMatrix(); renderSelectionBar();
  document.getElementById('result').innerHTML = '';
}

const EVENT_NAMES = {
  wedding: 'свадьбы',
  corporate: 'корпоратива',
  birthday: 'дня рождения',
  content: 'контента'
};

// ── API KEY ──────────────────────────────────────────────────
const API_KEY_LS = 'cm_api_key';

function getApiKey() {
  return localStorage.getItem(API_KEY_LS) || '';
}

function saveApiKey() {
  const inp = document.getElementById('api-key-input');
  const val = (inp.value || '').trim();
  if (!val.startsWith('sk-')) {
    showToast('✕ Ключ должен начинаться с sk-');
    return;
  }
  localStorage.setItem(API_KEY_LS, val);
  document.getElementById('api-key-banner').style.display = 'none';
  showToast('✓ Ключ сохранён');
}

function checkApiKeyBanner() {
  if (!getApiKey()) {
    document.getElementById('api-key-banner').style.display = 'block';
  }
}

// ── GENERATE (AI) ────────────────────────────────────────────
async function generate() {
  const ev = currentEvent;
  const chosen = AXIS_META.filter(a => selected[ev][a.key]);
  const resultDiv = document.getElementById('result');

  if (chosen.length < 2) {
    resultDiv.innerHTML = `<div class="result-box visible"><div class="loading">Выбери хотя бы 2 параметра</div></div>`;
    return;
  }

  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('api-key-banner').style.display = 'block';
    document.getElementById('api-key-banner').scrollIntoView({ behavior: 'smooth', block: 'center' });
    showToast('⚠️ Сначала введи API ключ');
    return;
  }

  resultDiv.innerHTML = `<div class="result-box visible"><div class="loading dot-anim">Claude придумывает конкурс</div></div>`;
  resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const params = chosen.map(a => `${a.label}: ${selected[ev][a.key]}`).join('\n');

  const prompt = `Ты опытный ведущий праздников. Придумай ОДИН оригинальный конкурс или развлечение для ${EVENT_NAMES[ev]}.

Параметры матрицы:
${params}

Все параметры должны органично сочетаться в одном конкурсе.

Ответь ТОЛЬКО в формате JSON (без markdown, без лишнего текста):
{
  "name": "Яркое название (3-6 слов)",
  "tags": ["тег1", "тег2", "тег3"],
  "description": "2-3 предложения: суть и почему работает.",
  "steps": [
    "Подготовка",
    "Начало",
    "Основная механика",
    "Финал / победитель"
  ],
  "tip": "Практический совет ведущему."
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (response.status === 401) {
      localStorage.removeItem(API_KEY_LS);
      document.getElementById('api-key-banner').style.display = 'block';
      resultDiv.innerHTML = `<div class="result-box visible"><div class="loading">Неверный ключ — введи снова</div></div>`;
      return;
    }

    const data = await response.json();
    const text = data.content.map(i => i.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const idea = JSON.parse(clean);

    const tagsHtml = idea.tags.map(t => `<span class="result-tag">${t}</span>`).join('');
    const stepsHtml = idea.steps.map(s => `<li>${s}</li>`).join('');

    resultDiv.innerHTML = `
      <div class="result-box visible">
        <div class="result-name">✦ ${idea.name}</div>
        <div class="result-tags">${tagsHtml}</div>
        <div class="result-desc">${idea.description}</div>
        <div class="result-steps-label">Как проводить</div>
        <ol class="result-steps">${stepsHtml}</ol>
        ${idea.tip ? `<div class="result-tip"><strong>Совет ведущему:</strong> ${idea.tip}</div>` : ''}
        <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button class="save-btn" onclick="saveToVault()">★ Сохранить в копилку</button>
          <button class="btn-secondary" onclick="generate()" style="padding:10px 24px;">↺ Ещё раз</button>
        </div>
      </div>`;

    window._lastIdea = { idea, event: ev, params: chosen.map(a => `${a.icon} ${selected[ev][a.key]}`).join(' · ') };

    // scroll to result on mobile
    setTimeout(() => resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

  } catch(e) {
    resultDiv.innerHTML = `<div class="result-box visible"><div class="loading">Ошибка. Попробуй ещё раз.</div></div>`;
  }
}

const EVENT_NOTES = { wedding: [], corporate: [], birthday: [], content: [] };

const EVENT_TITLES = {
  wedding:   '💡 Идеи — Свадьба',
  corporate: '💡 Идеи — Корпоратив',
  birthday:  '💡 Идеи — День рождения',
  content:   '💡 Идеи — Контент'
};

function saveCurrentNotes() {
  // textarea values are saved live via input event, nothing extra needed
}

function loadNotes(ev) {
  document.getElementById('ideasTitle').textContent = EVENT_TITLES[ev];
  renderIdeas(ev);
}

function renderIdeas(ev) {
  const list = document.getElementById('ideasList');
  list.innerHTML = '';
  EVENT_NOTES[ev].forEach((text, idx) => {
    list.appendChild(makeIdeaCard(ev, idx, text));
  });
}

function makeIdeaCard(ev, idx, text) {
  const card = document.createElement('div');
  card.className = 'idea-card';

  const num = document.createElement('span');
  num.className = 'idea-num';
  num.textContent = idx + 1;

  const ta = document.createElement('textarea');
  ta.className = 'idea-textarea';
  ta.placeholder = 'Опиши идею...';
  ta.value = text;
  ta.rows = 1;

  // auto-resize
  const resize = () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  };
  ta.addEventListener('input', () => {
    EVENT_NOTES[ev][idx] = ta.value;
    resize();
    saveState();
  });
  setTimeout(resize, 0);

  const del = document.createElement('button');
  del.className = 'idea-del';
  del.textContent = '✕';
  del.title = 'Удалить';
  del.addEventListener('click', () => {
    EVENT_NOTES[ev].splice(idx, 1);
    renderIdeas(ev);
  });

  card.appendChild(num);
  card.appendChild(ta);
  card.appendChild(del);
  return card;
}

function addIdea() {
  EVENT_NOTES[currentEvent].push('');
  renderIdeas(currentEvent);
  // focus last textarea
  setTimeout(() => {
    const tas = document.querySelectorAll('.idea-textarea');
    if (tas.length) tas[tas.length - 1].focus();
  }, 50);
}

// Tab switching
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  saveCurrentNotes();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentEvent = tab.dataset.event;
  renderMatrix();
  renderSelectionBar();
  loadNotes(currentEvent);
  document.getElementById('result').innerHTML = '';
});

// VAULT
let vault = [];

function saveToVault() {
  if (!window._lastIdea) return;
  const { idea, event, params } = window._lastIdea;
  vault.push({ idea, event, params, id: Date.now() });
  renderVault();
  // flash button
  const btn = document.querySelector('.save-btn');
  if (btn) { btn.textContent = '✓ Сохранено!'; btn.disabled = true; }
}

const EVENT_ICONS = { wedding:'💍', corporate:'🏢', birthday:'🎂', content:'🎬' };

function renderVault() {
  const wrap = document.getElementById('vault');
  if (!vault.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  const items = vault.map((entry, i) => `
    <div class="vault-card" id="vcard-${entry.id}">
      <div class="vault-card-top">
        <div>
          <span class="vault-event">${EVENT_ICONS[entry.event]}</span>
          <span class="vault-name">${entry.idea.name}</span>
        </div>
        <button class="vault-del" onclick="removeFromVault(${entry.id})" title="Удалить">✕</button>
      </div>
      <div class="vault-params">${entry.params}</div>
      <div class="vault-desc">${entry.idea.description}</div>
      <details class="vault-details">
        <summary>Как проводить</summary>
        <ol class="vault-steps">${entry.idea.steps.map(s => `<li>${s}</li>`).join('')}</ol>
        ${entry.idea.tip ? `<div class="vault-tip"><strong>Совет:</strong> ${entry.idea.tip}</div>` : ''}
      </details>
    </div>
  `).join('');

  wrap.innerHTML = `
    <div class="vault-header">
      <span class="vault-title">★ Копилка идей</span>
      <span class="vault-count">${vault.length} ${vault.length === 1 ? 'идея' : vault.length < 5 ? 'идеи' : 'идей'}</span>
      <button class="btn-secondary" style="margin-left:auto" onclick="clearVault()">Очистить всё</button>
    </div>
    <div class="vault-grid">${items}</div>`;
}

function removeFromVault(id) {
  vault = vault.filter(e => e.id !== id);
  renderVault();
}

function clearVault() {
  vault = [];
  renderVault();
}

// ── PERSISTENCE ──────────────────────────────────────────────
const LS_KEY = 'contest_matrix_v4';

function saveState() {
  try {
    const state = {
      customData,
      vault,
      EVENT_NOTES,
      DEFAULT_DATA   // включая переименованные дефолтные чипы
    };
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch(e) { console.warn('localStorage save failed', e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);

    if (state.DEFAULT_DATA) {
      ['wedding','corporate','birthday','content'].forEach(ev => {
        AXIS_META.forEach(a => {
          if (state.DEFAULT_DATA[ev]?.[a.key]) {
            DEFAULT_DATA[ev][a.key] = state.DEFAULT_DATA[ev][a.key];
          }
        });
      });
    }
    if (state.customData) {
      ['wedding','corporate','birthday','content'].forEach(ev => {
        AXIS_META.forEach(a => {
          if (state.customData[ev]?.[a.key]) {
            customData[ev][a.key] = state.customData[ev][a.key];
          }
        });
      });
    }
    if (state.vault) vault = state.vault;
    if (state.EVENT_NOTES) {
      ['wedding','corporate','birthday','content'].forEach(ev => {
        if (state.EVENT_NOTES[ev]) EVENT_NOTES[ev] = state.EVENT_NOTES[ev];
      });
    }
    return true;
  } catch(e) { console.warn('localStorage load failed', e); return false; }
}

// Patch all mutating functions to auto-save
const _origRenderMatrix = renderMatrix;

// wrap chip add/delete/rename to trigger save — done via patching doAdd and commit in renderMatrix
// Simpler: save on every renderMatrix & renderIdeas call
function saveAfter(fn) {
  return function(...args) {
    fn.apply(this, args);
    saveState();
  };
}

// ── EXPORT ───────────────────────────────────────────────────
function exportData() {
  const state = {
    version: '4.0',
    exportedAt: new Date().toISOString(),
    customData,
    vault,
    EVENT_NOTES,
    DEFAULT_DATA
  };
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `contest_matrix_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── IMPORT ───────────────────────────────────────────────────
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);

      if (state.DEFAULT_DATA) {
        ['wedding','corporate','birthday','content'].forEach(ev => {
          AXIS_META.forEach(a => {
            if (state.DEFAULT_DATA[ev]?.[a.key]) {
              DEFAULT_DATA[ev][a.key] = state.DEFAULT_DATA[ev][a.key];
            }
          });
        });
      }
      if (state.customData) {
        ['wedding','corporate','birthday','content'].forEach(ev => {
          AXIS_META.forEach(a => {
            customData[ev][a.key] = state.customData[ev]?.[a.key] || [];
          });
        });
      }
      if (state.vault) vault = state.vault;
      if (state.EVENT_NOTES) {
        ['wedding','corporate','birthday','content'].forEach(ev => {
          EVENT_NOTES[ev] = state.EVENT_NOTES[ev] || [];
        });
      }

      saveState();
      renderMatrix();
      renderSelectionBar();
      loadNotes(currentEvent);
      renderVault();

      // brief toast
      showToast('✓ Импорт завершён');
    } catch(err) {
      showToast('✕ Ошибка импорта — проверь файл');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = `
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      background:#ffffff;border:1px solid var(--border);border-left:3px solid var(--accent);
      color:var(--text);font-family:'Courier Prime',monospace;font-size:12px;letter-spacing:1px;
      padding:10px 22px;border-radius:3px;z-index:9999;opacity:0;
      transition:opacity 0.2s;pointer-events:none;white-space:nowrap;`;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2200);
}

// Patch mutating functions to auto-save after changes
const _origRandomize = randomize;
randomize = function() { _origRandomize(); saveState(); };

const _origResetSelected = resetSelected;
resetSelected = function() { _origResetSelected(); saveState(); };

const _origSaveToVault = saveToVault;
saveToVault = function() { _origSaveToVault(); saveState(); };

const _origRemoveFromVault = removeFromVault;
removeFromVault = function(id) { _origRemoveFromVault(id); saveState(); };

const _origClearVault = clearVault;
clearVault = function() { _origClearVault(); saveState(); };

const _origAddIdea = addIdea;
addIdea = function() { _origAddIdea(); saveState(); };

// Patch renderMatrix to save after every re-render (covers chip add/delete/rename)
const _renderMatrixOrig = renderMatrix;
renderMatrix = function() {
  _renderMatrixOrig();
  saveState();
};

// Patch renderIdeas to save after note changes
const _renderIdeasOrig = renderIdeas;
renderIdeas = function(ev) {
  _renderIdeasOrig(ev);
  // notes saved inline via input event, but re-render means save
  saveState();
};

// ── INIT ─────────────────────────────────────────────────────
const hadSaved = loadState();
renderMatrix();
renderSelectionBar();
loadNotes('wedding');
if (hadSaved) renderVault();
if (hadSaved) showToast('💾 Данные восстановлены');
checkApiKeyBanner();
</script>
